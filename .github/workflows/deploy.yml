name: Déploiement GitHub Pages

# Site statique (HTML/CSS/JS vanilla) — aucune étape de build.
# Le job publie le contenu du dépôt tel quel sur GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises pour publier sur Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on annule les déploiements en cours dépassés.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          # Racine du dépôt : index.html, css/, js/, icons/, manifest, sw.js
          path: "."

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
