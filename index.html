<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e7c66" />
  <meta name="description" content="Apprendre l'arabe classique (MSA) et le darija marocain — hors-ligne." />
  <title>Darija &amp; Arabe</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="app-header">

  <nav class="tabbar">
    <button class="tab" data-route="home">
      <span class="tab-ico">🏠</span><span>Sections</span>
    </button>
    <button class="tab" data-route="review">
      <span class="tab-ico">🎯</span><span>Réviser</span>
    </button>
    <button class="tab" data-route="settings">
      <span class="tab-ico">⚙️</span><span>Données</span>
    </button>
  </nav>

  <!-- Conteneur des fenêtres modales -->
  <div id="modalRoot"></div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>

</html>
